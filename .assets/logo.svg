<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal window background -->
  <rect x="5" y="5" width="90" height="90" rx="8" fill="#1a1a2e" stroke="#4a9eff" stroke-width="2"/>
  
  <!-- Window header -->
  <rect x="5" y="5" width="90" height="20" rx="8" fill="#16213e"/>
  <rect x="5" y="13" width="90" height="12" fill="#16213e"/>
  
  <!-- Dots -->
  <circle cx="18" cy="15" r="3" fill="#ff5f56"/>
  <circle cx="28" cy="15" r="3" fill="#ffbd2e"/>
  <circle cx="38" cy="15" r="3" fill="#27c93f"/>
  
  <!-- Terminal content - code brackets -->
  <text x="50" y="70" font-family="monospace" font-size="36" font-weight="bold" 
        fill="#4a9eff" text-anchor="middle">&lt;/&gt;</text>
</svg>
