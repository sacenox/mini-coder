<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINI-CODER(1) Manual</title>
    <style>
        :root {
            --bg: #0d1117;
            --fg: #c9d1d9;
            --accent: #58a6ff;
            --keyword: #ff7b72;
            --dim: #8b949e;
            --surface: #161b22;
            --border: #30363d;
            --font: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
        }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        h1, h2, h3 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 2.5rem;
        }
        h1 { font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; }
        h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
        strong, b { color: var(--keyword); }
        code {
            background: rgba(255,255,255,0.1);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: inherit;
        }
        pre {
            background: var(--surface);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            border-left: 3px solid var(--accent);
        }
        pre code { background: none; padding: 0; }
        ul, ol { list-style-type: square; }
        ol { list-style-type: decimal; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        dl dt { color: var(--keyword); margin-top: 0.8em; }
        dl dd { margin-left: 1.5em; margin-bottom: 0.3em; }
        .man-header, .man-footer {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .man-header { border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 2rem; }
        .man-footer { border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 3rem; font-size: 0.9em; opacity: 0.8; }
        #loading { color: var(--dim); text-align: center; padding: 4rem 0; }
        #error { color: var(--keyword); text-align: center; padding: 2rem 0; display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="man-header">
        <span>MINI-CODER(1)</span>
        <span>User Manuals</span>
        <span>MINI-CODER(1)</span>
    </div>

    <div id="loading">loading manual…</div>
    <div id="error">failed to load manual — <a href="https://github.com/sacenox/mini-coder/blob/main/docs/mini-coder.1.md">view on GitHub</a></div>
    <div id="content"></div>

    <div class="man-footer">
        <span>mini-coder</span>
        <span><a href="https://github.com/sacenox/mini-coder">github.com/sacenox/mini-coder</a></span>
        <span>MINI-CODER(1)</span>
    </div>

    <script>
        const RAW = 'https://raw.githubusercontent.com/sacenox/mini-coder/main/docs/mini-coder.1.md';

        fetch(RAW)
            .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
            .then(md => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').innerHTML = marked.parse(md);
            })
            .catch(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            });
    </script>
</body>
</html>
